name: Bids & Tenders Scraper

on:
  schedule:
    - cron: "0 13 * * 1"   # 9am EST (UTC-4), Mondays only
  workflow_dispatch:           # also allows manual "Run workflow" button

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Write credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Write firebase-service-account.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SA" ]; then
            echo "$FIREBASE_SA" > firebase-service-account.json
          fi

      - name: Run scraper
        run: python scraper.py

      - name: Commit bids.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bids.json
          git diff --cached --quiet || git commit -m "Update bids.json [$(date '+%Y-%m-%d')]"
          git push

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
